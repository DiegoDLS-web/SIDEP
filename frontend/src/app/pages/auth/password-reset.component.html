<div class="sid-auth-shell">
  <div class="w-full max-w-md rounded-xl border border-gray-800 bg-[#121212] p-6">
    <h1 class="mb-2 text-2xl font-bold text-white">Restablecer contraseña</h1>
    @if (ok) {
      <div class="rounded-lg border border-green-700 bg-green-900/20 px-4 py-3 text-sm text-green-300">
        Contraseña actualizada correctamente.
      </div>
      <a routerLink="/login" class="mt-4 inline-block text-sm text-gray-300 hover:text-white">Ir al login</a>
    } @else {
      @if (error) {
        <div class="mb-4 rounded-lg border border-red-700 bg-red-900/20 px-4 py-3 text-sm text-red-300">
          {{ error }}
        </div>
      }
      <label class="mb-2 block text-sm text-gray-300">Nueva contraseña</label>
      <input
        [(ngModel)]="password"
        type="password"
        class="mb-4 w-full rounded-lg border border-gray-700 bg-[#0a0a0a] px-3 py-2 text-white focus:border-red-500 focus:outline-none"
      />
      <label class="mb-2 block text-sm text-gray-300">Confirmar contraseña</label>
      <input
        [(ngModel)]="confirm"
        type="password"
        class="mb-4 w-full rounded-lg border border-gray-700 bg-[#0a0a0a] px-3 py-2 text-white focus:border-red-500 focus:outline-none"
      />
      <button
        type="button"
        [disabled]="loading"
        class="w-full rounded-lg bg-red-600 py-2.5 font-medium transition-colors hover:bg-red-700 disabled:opacity-60"
        (click)="guardar()"
      >
        {{ loading ? 'Guardando...' : 'Guardar nueva contraseña' }}
      </button>
    }
  </div>
</div>
