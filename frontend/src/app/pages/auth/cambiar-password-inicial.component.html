<div class="mx-auto flex min-h-[70vh] max-w-lg flex-col justify-center px-4 py-10">
  <div class="rounded-2xl border border-gray-800 bg-[#121212] p-6 shadow-xl sm:p-8">
    <h1 class="mb-2 text-xl font-bold text-white sm:text-2xl">Cambiar contraseña</h1>
    <p class="mb-6 text-sm leading-relaxed text-gray-400">
      Tu cuenta usa una contraseña provisional asignada en el registro. Ingresa esa contraseña y elige una nueva para
      continuar.
    </p>

    @if (error) {
      <div class="mb-4 rounded-lg border border-red-800/60 bg-red-950/40 px-3 py-2 text-sm text-red-200">
        {{ error }}
      </div>
    }

    <div class="space-y-4">
      <div>
        <label class="mb-1.5 block text-sm font-medium text-gray-300">
          Contraseña actual <span class="text-red-400">*</span>
        </label>
        <input
          type="password"
          [(ngModel)]="passwordActual"
          name="passwordActual"
          autocomplete="current-password"
          class="w-full rounded-lg border border-gray-700 bg-[#0a0a0a] px-3 py-2.5 text-white focus:border-red-500 focus:outline-none"
        />
      </div>
      <div>
        <label class="mb-1.5 block text-sm font-medium text-gray-300">
          Nueva contraseña <span class="text-red-400">*</span>
        </label>
        <input
          type="password"
          [(ngModel)]="passwordNueva"
          name="passwordNueva"
          autocomplete="new-password"
          class="w-full rounded-lg border border-gray-700 bg-[#0a0a0a] px-3 py-2.5 text-white focus:border-red-500 focus:outline-none"
        />
      </div>
      <div>
        <label class="mb-1.5 block text-sm font-medium text-gray-300">
          Confirmar nueva contraseña <span class="text-red-400">*</span>
        </label>
        <input
          type="password"
          [(ngModel)]="passwordNueva2"
          name="passwordNueva2"
          autocomplete="new-password"
          class="w-full rounded-lg border border-gray-700 bg-[#0a0a0a] px-3 py-2.5 text-white focus:border-red-500 focus:outline-none"
        />
      </div>
    </div>

    <button
      type="button"
      class="mt-6 w-full rounded-lg bg-red-600 py-3 font-medium text-white transition-colors hover:bg-red-700 disabled:opacity-50"
      [disabled]="loading"
      (click)="guardar()"
    >
      {{ loading ? 'Guardando…' : 'Guardar y continuar' }}
    </button>
  </div>
</div>
