<div class="relative sid-auth-shell min-h-screen">
  <div class="absolute inset-0 bg-cover bg-center" style="background-image: url('assets/login-bg.png')" aria-hidden="true"></div>
  <div class="absolute inset-0 bg-black/70" aria-hidden="true"></div>
  <div class="relative z-10 w-full max-w-md px-4">
    <div class="sid-glass-panel rounded-xl border border-gray-700/80 bg-[#121212]/90 p-6 backdrop-blur-sm sm:p-8">
      <h1 class="mb-2 text-2xl font-bold text-white">Recuperar contraseña</h1>
      <p class="mb-5 text-sm text-gray-400">Te enviaremos un enlace para restablecer tu acceso.</p>
      @if (msg) {
        <div class="mb-4 rounded-lg border border-green-700 bg-green-900/20 px-4 py-3 text-sm text-green-300">
          {{ msg }}
        </div>
      }
      @if (error) {
        <div class="mb-4 rounded-lg border border-red-700 bg-red-900/20 px-4 py-3 text-sm text-red-300">
          {{ error }}
        </div>
      }
      <label class="mb-2 block text-sm text-gray-300">Correo</label>
      <input
        [(ngModel)]="email"
        type="email"
        class="mb-4 w-full rounded-lg border border-gray-700 bg-[#0a0a0a] px-3 py-2.5 text-white placeholder:text-gray-500 focus:border-red-500 focus:outline-none focus:ring-1 focus:ring-red-500/40"
        placeholder="usuario@bomberos.cl"
      />
      <button
        type="button"
        [disabled]="loading"
        class="w-full rounded-lg bg-red-600 py-2.5 font-medium text-white transition-colors hover:bg-red-700 disabled:opacity-60"
        (click)="enviar()"
      >
        {{ loading ? 'Enviando...' : 'Enviar enlace' }}
      </button>
      <a routerLink="/login" class="mt-4 inline-block text-sm text-gray-400 transition-colors hover:text-white">Volver al login</a>
    </div>
  </div>
</div>
