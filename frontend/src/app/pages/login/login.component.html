<div class="relative sid-auth-shell">
  <div class="absolute inset-0 bg-cover bg-center" style="background-image: url('assets/login-bg.png')" aria-hidden="true"></div>
  <div class="absolute inset-0 bg-black/70" aria-hidden="true"></div>
  <div class="relative z-10 w-full max-w-md">
    <div class="sid-hero-premium mb-8 flex flex-col items-center text-center">
      <app-sidep-brand-lockup class="w-full max-w-sm px-2" variant="hero" [subline]="nombreCompaniaTag() ?? 'Compañía'" />
      <h1 class="sr-only">SIDEP · inicio de sesión</h1>
    </div>

    <div class="sid-glass-panel rounded-xl border border-gray-700/80 bg-[#121212]/90 p-8 backdrop-blur-sm">
      <h2 class="mb-6 text-2xl font-bold text-white">Iniciar Sesión</h2>
      <p class="mb-4 text-sm text-gray-400">Si no ingresas datos, entrarás en modo demo automáticamente.</p>
      @if (error) {
        <div class="sid-feedback mb-4 rounded-lg border border-red-700 bg-red-900/20 px-4 py-3 text-sm text-red-300">
          {{ error }}
        </div>
      }

      <form class="space-y-5" (ngSubmit)="submit()">
        <div>
          <label class="mb-2 block text-sm font-medium text-gray-300">Correo electrónico</label>
          <div class="relative">
            <lucide-icon
              name="mail"
              class="pointer-events-none absolute left-3 top-1/2 h-5 w-5 -translate-y-1/2 text-gray-400"
              [size]="20"
              color="currentColor"
            ></lucide-icon>
            <input
              type="email"
              name="email"
              [(ngModel)]="email"
              required
              placeholder="usuario@bomberos.cl"
              class="box-border w-full rounded-lg border border-gray-700 bg-[#0a0a0a] py-3 pl-12 pr-4 text-white placeholder:text-gray-500 focus:border-red-500 focus:outline-none focus:ring-1 focus:ring-red-500/40"
            />
          </div>
        </div>

        <div>
          <label class="mb-2 block text-sm font-medium text-gray-300">Contraseña</label>
          <div class="relative">
            <lucide-icon
              name="lock"
              class="pointer-events-none absolute left-3 top-1/2 h-5 w-5 -translate-y-1/2 text-gray-400"
              [size]="20"
              color="currentColor"
            ></lucide-icon>
            <input
              type="password"
              name="password"
              [(ngModel)]="password"
              required
              placeholder="••••••••"
              class="box-border w-full rounded-lg border border-gray-700 bg-[#0a0a0a] py-3 pl-12 pr-4 text-white placeholder:text-gray-500 focus:border-red-500 focus:outline-none focus:ring-1 focus:ring-red-500/40"
            />
          </div>
        </div>

        <div class="flex flex-wrap items-center justify-between gap-3">
          <label class="inline-flex cursor-pointer select-none items-center gap-2 text-sm text-gray-400">
            <input [(ngModel)]="recordarme" type="checkbox" class="peer sr-only" name="recordarme" />
            <span
              class="flex h-[18px] w-[18px] shrink-0 items-center justify-center rounded border border-slate-500 bg-[#0d1016] text-red-400 shadow-inner shadow-black/60 peer-checked:border-red-600/80 peer-checked:bg-[#120808] peer-focus-visible:outline peer-focus-visible:outline-2 peer-focus-visible:outline-offset-2 peer-focus-visible:outline-red-600/50"
              aria-hidden="true"
            >
              @if (recordarme) {
                <span class="text-[10px] font-bold leading-none">✓</span>
              }
            </span>
            Recordarme
          </label>
          <a routerLink="/recuperar-password" class="text-sm text-red-500 hover:text-red-400"
            >¿Olvidaste tu contraseña?</a
          >
        </div>

        <button
          type="submit"
          [disabled]="loading"
          class="w-full rounded-lg bg-red-600 py-3 font-medium text-white transition-colors hover:bg-red-700 disabled:opacity-60"
        >
          {{ loading ? 'Ingresando...' : 'Ingresar al Sistema' }}
        </button>
        <button
          type="button"
          [disabled]="loading"
          class="w-full rounded-lg border border-gray-700 bg-transparent py-3 font-medium text-white transition-colors hover:bg-gray-800 disabled:opacity-60"
          (click)="entrarDemo()"
        >
          Entrar modo prueba (sin credenciales)
        </button>
      </form>

      <div class="mt-6 border-t border-gray-800 pt-6 text-center">
        <p class="text-sm text-gray-400">
          ¿Problemas para acceder? Ponte en contacto con la administración de tu compañía o con el responsable SIDEP del
          cuartel.
        </p>
      </div>
    </div>
  </div>
</div>
